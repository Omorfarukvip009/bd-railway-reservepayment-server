<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/styles.css">
<title>Admin Panel</title>
</head>
<body>

<div class="container">
<h2>Admin Panel</h2>

<input type="text" id="number" placeholder="Bkash Number">
<input type="text" id="amount" placeholder="Amount">

<button onclick="update()">Update</button>
<button onclick="block()">Hide Website</button>
<button onclick="show()">Show Website</button>
</div>

<script>
function update(){
  fetch("/api/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      bkashNumber:document.getElementById("number").value,
      amount:document.getElementById("amount").value
    })
  }).then(()=>alert("Updated"));
}

function block(){
  fetch("/api/block",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({status:true})
  }).then(()=>alert("Website Hidden"));
}

function show(){
  fetch("/api/block",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({status:false})
  }).then(()=>alert("Website Visible"));
}
</script>

</body>
</html>
