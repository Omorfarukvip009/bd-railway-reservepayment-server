<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<title>Admin Panel</title>
</head>
<body>

<div class="container">

  <div class="card">
    <img src="logo.png" class="logo">
    <h2>Admin Login</h2>
    <input id="auser" class="input" placeholder="Admin Username">
    <input id="apass" type="password" class="input" placeholder="Admin Password">
    <button onclick="adminLogin()" class="btn">Login</button>
  </div>

  <div class="card">
    <h2>Create / Update User</h2>
    <input id="uuser" class="input" placeholder="Username">
    <input id="upass" class="input" placeholder="Password">
    <input id="unum" class="input" placeholder="bKash Number">
    <input id="uamount" type="number" class="input" placeholder="Amount">
    <label><input type="checkbox" id="ublock"> Block User</label>
    <button onclick="saveUser()" class="btn">Save User</button>
  </div>

</div>

<script>
async function adminLogin(){
  await fetch("/api/admin/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:auser.value,
      password:apass.value
    })
  });
}

async function saveUser(){
  await fetch("/api/admin/user",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:uuser.value,
      password:upass.value,
      bkashNumber:unum.value,
      amount:Number(uamount.value),
      blocked:ublock.checked
    })
  });
}
</script>

</body>
</html>
