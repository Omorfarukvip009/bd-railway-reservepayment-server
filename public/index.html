<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/styles.css">
<title>Railway Payment</title>
</head>
<body>

<div class="container">
  <img src="/logo.png" class="logo">

  <div id="content">
    <h2>Railway Payment Login</h2>
    <p>Bkash Number: <span id="number"></span></p>
    <p>Amount: ৳<span id="amount"></span></p>
  </div>
</div>

<script>
fetch("/api/settings")
.then(res => res.json())
.then(data => {
  if(data.blocked){
    document.body.innerHTML = "<h1 style='text-align:center;margin-top:100px;'>404 ERROR NOTHING FOUND</h1>";
  } else {
    document.getElementById("number").innerText = data.bkashNumber;
    document.getElementById("amount").innerText = data.amount;
  }
});
</script>

</body>
</html>
